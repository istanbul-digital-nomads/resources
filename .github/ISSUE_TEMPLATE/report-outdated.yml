name: Report Outdated Info
description: Let us know about incorrect or outdated information in a guide
title: "[Update] "
labels: ["outdated", "content-update"]
body:
  - type: dropdown
    id: guide
    attributes:
      label: Which guide?
      options:
        - Neighborhoods
        - Coworking Spaces
        - Laptop-Friendly Cafes
        - Visa & Legal
        - Housing
        - Internet & Connectivity
        - Transportation
        - Cost of Living
        - Healthcare
        - Food & Groceries
    validations:
      required: true

  - type: textarea
    id: outdated
    attributes:
      label: What is outdated or incorrect?
      description: Please be specific about which section and what needs updating.
    validations:
      required: true

  - type: textarea
    id: correct-info
    attributes:
      label: Correct information
      description: If you know the current/correct info, share it here.
    validations:
      required: false
